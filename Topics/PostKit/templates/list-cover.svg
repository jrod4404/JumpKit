<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="{{BG_COLOR}}"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </linearGradient>
    <linearGradient id="thread-number-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="{{ACCENT_COLOR}}"/>
      <stop offset="100%" stop-color="{{ACCENT_COLOR}}" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg-grad)"/>

  <!-- Large thread number background -->
  <text x="80" y="320" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="280" font-weight="900" fill="url(#thread-number-grad)" opacity="0.12">{{THREAD_NUMBER}}</text>

  <!-- Thread indicator pill -->
  <rect x="80" y="80" width="180" height="44" rx="22" fill="{{ACCENT_COLOR}}" opacity="0.15"/>
  <text x="170" y="109" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="600" fill="{{ACCENT_COLOR}}" text-anchor="middle">THREAD</text>

  <!-- Total count -->
  <text x="1100" y="109" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="500" fill="{{TEXT_COLOR}}" opacity="0.4" text-anchor="end">{{TOTAL_COUNT}} posts</text>

  <!-- Title text -->
  <text id="title-body" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="44" font-weight="700" fill="{{TEXT_COLOR}}">
{{TITLE_TEXT_LINES}}
  </text>

  <!-- Accent bar -->
  <rect x="80" y="570" width="100" height="4" rx="2" fill="{{ACCENT_COLOR}}"/>

  <!-- JumpKit wordmark -->
  <text x="1080" y="635" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="700" fill="{{TEXT_COLOR}}" opacity="0.45" text-anchor="end">JumpKit</text>
</svg>
