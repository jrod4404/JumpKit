<!DOCTYPE html>
<html lang="en">
<head>

  <script src="js/theme-bootstrap.js"></script>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JumpKit</title>
  <link rel="icon" type="image/png" href="img/logo-sm.png"/>
  <link rel="preload" href="img/tabler-sprite.min.svg" as="image" type="image/svg+xml"/>
  <link rel="stylesheet" href="css/vars.css"/>
  <link rel="stylesheet" href="css/app.css"/>
  <!-- Tabler Icons: SVG sprite (crisp at any resolution, no webfont blur) -->
  <style>
    svg.ti { width: 1em; height: 1em; display: inline-block; vertical-align: -0.125em; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    svg.ti.nav-icon { width: 1.4rem; height: 1.4rem; }
  </style>
  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<body>
<!-- Update Banner -->
<div id="updateBanner" style="display:none;position:fixed;top:0;left:0;right:0;z-index:9999;background:var(--hover-accent);color:#fff;padding:10px 20px;display:none;align-items:center;justify-content:center;gap:12px;font-size:0.88rem;font-weight:600;">
  <svg class="ti ti-refresh" style="font-size:1rem"><use href="img/tabler-sprite.min.svg#tabler-refresh"/></svg>
  <span>A new version of JumpKit is available and ready to install.</span>
  <button onclick="window.electronAPI.installUpdate()" style="background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);color:#fff;border-radius:6px;padding:4px 14px;cursor:pointer;font-size:0.85rem;font-weight:700">Restart &amp; Update</button>
  <button onclick="document.getElementById('updateBanner').style.display='none'" style="background:none;border:none;color:rgba(255,255,255,0.7);cursor:pointer;font-size:1.1rem;line-height:1;margin-left:4px">&times;</button>
</div>

<div class="app-shell">

      <button class="nav-item"        data-page="jet">    <svg class="ti ti-brain nav-icon"><use href="img/tabler-sprite.min.svg#tabler-brain"/></svg><span class="nav-label"> Jet AI</span></button>
      -->


      <button class="nav-item"        data-page="stats">    <svg class="ti ti-chart-bar nav-icon"><use href="img/tabler-sprite.min.svg#tabler-chart-bar"/></svg><span class="nav-label"> Statistics</span></button>
      <button class="nav-item"        data-page="teams">   <svg class="ti ti-users nav-icon"><use href="img/tabler-sprite.min.svg#tabler-users"/></svg><span class="nav-label"> Teams</span></button>
      <button class="nav-item"        data-page="settings"><svg class="ti ti-settings nav-icon"><use href="img/tabler-sprite.min.svg#tabler-settings"/></svg><span class="nav-label"> Settings</span></button>
      <button class="nav-item"        data-page="help">     <svg class="ti ti-help-circle nav-icon"><use href="img/tabler-sprite.min.svg#tabler-help-circle"/></svg><span class="nav-label"> Help</span></button>
      <div class="nav-section-label" id="adminNavLabel" style="display:none">ADMIN</div>
      <button class="nav-item" data-page="admin" style="display:none" id="adminNavBtn">
        <svg class="ti ti-users nav-icon"><use href="img/tabler-sprite.min.svg#tabler-users"/></svg>
        <span class="nav-label"> Users</span>
      </button>
      <button class="nav-item"        data-page="tests" style="display:none"><svg class="ti ti-test-pipe nav-icon"><use href="img/tabler-sprite.min.svg#tabler-test-pipe"/></svg><span class="nav-label"> Testing</span></button>

        <svg class="ti ti-chevrons-right" id="sidebarToggleIcon"><use href="img/tabler-sprite.min.svg#tabler-chevrons-right"/></svg>
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main-area">
    <div class="topbar">
      <span class="topbar-title"><span id="topbarIcon"></span> <span id="topbarTitle">Home</span></span>
      <span class="topbar-subtitle" id="topbarSubtitle"></span>
      <div class="topbar-right">
        <button class="theme-btn" id="themeBtn"><svg class="ti ti-sun"><use href="img/tabler-sprite.min.svg#tabler-sun"/></svg></button>
        <button class="theme-btn" id="notifBtn"><svg class="ti ti-bell"><use href="img/tabler-sprite.min.svg#tabler-bell"/></svg></button>
        <div class="user-menu-wrap">
          <div class="user-badge" id="userMenuTrigger">
            <div class="user-avatar" id="userAvatar">J</div>
            <span id="userName">User</span>
            <svg class="ti ti-chevron-down" style="font-size:.8rem;color:var(--text-muted)"><use href="img/tabler-sprite.min.svg#tabler-chevron-down"/></svg>
          </div>
          <div class="user-dropdown" id="userDropdown">
            <button class="dropdown-item" data-page="account">  <svg class="ti ti-user"><use href="img/tabler-sprite.min.svg#tabler-user"/></svg> My Account</button>

            <div class="dropdown-divider"></div>
            <button class="dropdown-item danger" id="logoutBtn"><svg class="ti ti-logout" style="margin-left:2px"><use href="img/tabler-sprite.min.svg#tabler-logout"/></svg> Logout</button>
          </div>
        </div>
      </div>
    </div>
    <div class="page-content" id="pageContent"></div>
  </div>

</div>

<!-- CONTEXT MENU -->
<div class="ctx-menu" id="ctxMenu" style="display:none"></div>
<!-- JUMP TOOLTIP -->
<div id="jumpTooltip"></div>

<!-- MODAL -->
<div id="toastEl" class="toast" aria-live="polite"></div>

<div class="modal-overlay" id="modalOverlay" style="display:none">
  <div class="modal-box" id="modalBox">
    <div class="modal-header">
      <h2 id="modalTitle"></h2>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>
