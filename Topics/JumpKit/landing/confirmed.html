<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Confirmed — JumpKit</title>
  <meta name="robots" content="noindex" />
  <link rel="canonical" href="https://jumpkit.app/confirmed" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <meta name="theme-color" content="#00C2C7" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .confirmed-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background: #0E1827;
    }
    .confirmed-card {
      background: #111d2e;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 44px 40px 36px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }
    .confirmed-logo {
      max-height: 56px;
      width: auto;
      display: block;
      margin: 0 auto 28px;
    }
    .confirmed-icon {
      width: 64px;
      height: 64px;
      background: rgba(80,202,204,0.12);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    .confirmed-icon svg {
      width: 32px;
      height: 32px;
      color: #50CACC;
    }
    .confirmed-card h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #C8D6E8;
      margin-bottom: 12px;
    }
    .confirmed-card p {
      color: #7A93B4;
      font-size: 0.95rem;
      line-height: 1.7;
      margin-bottom: 32px;
    }
    .confirmed-card p strong {
      color: #C8D6E8;
    }
    .btn-confirmed {
      display: inline-block;
      background: linear-gradient(135deg, #50CACC, #1A4FD6);
      color: white;
      font-weight: 600;
      font-size: 0.95rem;
      padding: 12px 28px;
      border-radius: 10px;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn-confirmed:hover { opacity: 0.88; }
    .confirmed-footer {
      margin-top: 32px;
      color: #4A6280;
      font-size: 0.8rem;
    }
    .error-icon {
      width: 64px;
      height: 64px;
      background: rgba(225,91,89,0.12);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    .error-icon svg {
      width: 32px;
      height: 32px;
      color: #e15b59;
    }
  </style>
</head>
<body>
  <div class="confirmed-wrap">
    <div class="confirmed-card">
      <img src="/logo-dark-mode.png" alt="JumpKit" class="confirmed-logo" />

      <div class="confirmed-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
      </div>

      <h1>Email Confirmed!</h1>
      <p>
        Your JumpKit account is now active.<br />
        Open the <strong style="color:#C8D6E8;font-weight:700">JumpKit Desktop app</strong> and sign in to get started.
      </p>

      <div style="margin-top:20px;font-size:0.85rem"><a href="https://jumpkit.app" style="color:#50CACC;text-decoration:none">← Back to jumpkit.app</a></div>
    </div>
  </div>
  <script>
    (function () {
      const hash = window.location.hash.slice(1);
      const params = new URLSearchParams(hash);
      const error = params.get('error');
      const errorCode = params.get('error_code');

      if (!error) return; // no error — success state stays

      const isExpired = errorCode === 'otp_expired';
      const icon = document.querySelector('.confirmed-icon');
      const h1   = document.querySelector('.confirmed-card h1');
      const p    = document.querySelector('.confirmed-card p');

      // Swap icon to error style
      icon.className = 'error-icon';
      icon.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>';

      // Update title
      document.title = isExpired ? 'Link Expired — JumpKit' : 'Confirmation Failed — JumpKit';
      h1.textContent = isExpired ? 'Link Expired' : 'Confirmation Failed';

      // Update message
      p.innerHTML = isExpired
        ? 'This confirmation link has expired. Confirmation links are only valid for a limited time.<br /><br />Open the <strong>JumpKit app</strong>, sign in with your email, and use the <strong>&ldquo;Click here to resend the confirmation email&rdquo;</strong> link to get a fresh one.'
        : 'Something went wrong confirming your email. Please return to the JumpKit app and try signing in — you can request a new confirmation link from the login screen.';
    })();
  </script>
</body>
</html>
