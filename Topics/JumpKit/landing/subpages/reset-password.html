<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — JumpKit</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0E1827; color: #C8D6E8;
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .card {
      background: #111d2e; border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px; padding: 44px 40px 36px;
      width: 100%; max-width: 420px; box-shadow: 0 8px 40px rgba(0,0,0,0.4); text-align: center;
    }
    .logo { max-height: 56px; width: auto; margin: 0 auto 28px; display: block; }
    .icon-wrap {
      width: 64px; height: 64px; background: rgba(80,202,204,0.12);
      border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;
    }
    h1 { font-size: 1.3rem; font-weight: 700; color: #fff; margin-bottom: 8px; }
    .sub { font-size: 0.9rem; color: #7A93B4; margin-bottom: 28px; line-height: 1.6; }
    .form-group { text-align: left; margin-bottom: 16px; }
    label { display: block; font-size: 0.82rem; font-weight: 600; color: #7A93B4; margin-bottom: 6px; }
    input[type="password"] {
      width: 100%; padding: 11px 14px; background: #0a1520;
      border: 1.5px solid rgba(255,255,255,0.1); border-radius: 8px;
      color: #C8D6E8; font-size: 0.95rem; outline: none; transition: border-color 0.2s;
    }
    input[type="password"]:focus { border-color: #50CACC; }
    input[type="password"].invalid { border-color: #f87171; }
    .err { font-size: 0.8rem; color: #f87171; margin-top: 5px; display: none; }
    /* Password strength checklist */
    .pw-rules { text-align: left; margin: 8px 0 4px; padding: 0; padding-left: 25px; list-style: none; }
    .pw-rules li { font-size: 0.78rem; color: #4A6280; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; transition: color 0.2s; }
    .pw-rules li::before { content: '✕'; color: #f87171; font-size: 0.7rem; font-weight: 700; flex-shrink: 0; transition: color 0.2s; }
    .pw-rules li.pass { color: #50CACC; }
    .pw-rules li.pass::before { content: '✓'; color: #50CACC; }
    .btn {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, #50CACC, #1A4FD6);
      color: #fff; font-weight: 700; font-size: 0.95rem;
      border: none; border-radius: 10px; cursor: pointer; margin-top: 8px;
    }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .alert {
      padding: 12px 16px; border-radius: 8px; font-size: 0.88rem;
      margin-bottom: 20px; display: none; text-align: left;
    }
    .alert.error { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: #f87171; }
    .alert.success { background: rgba(72,187,120,0.1); border: 1px solid rgba(72,187,120,0.3); color: #48BB78; }
    .back { margin-top: 20px; font-size: 0.85rem; }
    .back a { color: #50CACC; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <img src="../logo-dark-mode.png" alt="JumpKit" class="logo"/>
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="#50CACC" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:30px;height:30px">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <h1>Set New Password</h1>
    <p class="sub">Choose a strong password for your JumpKit account.</p>
    <div class="alert" id="formAlert"></div>
    <div id="theForm">
      <div class="form-group">
        <label>New Password</label>
        <input type="password" id="newPass" placeholder="Enter new password" autocomplete="new-password"/>
        <ul class="pw-rules" id="pwRules">
          <li id="rule-len">At least 8 characters</li>
          <li id="rule-upper">One uppercase letter</li>
          <li id="rule-lower">One lowercase letter</li>
          <li id="rule-num">One number</li>
          <li id="rule-special">One special character (!@#$%^&*)</li>
        </ul>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="confirmPass" placeholder="Re-enter your password" autocomplete="new-password"/>
        <div class="err" id="confirmErr">Passwords do not match.</div>
      </div>
      <button class="btn" id="btnReset" type="button">Update Password</button>
    </div>
    <div class="back"><a href="https://jumpkit.app">← Back to jumpkit.app</a></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    var rules = {
      len:     { el: document.getElementById('rule-len'),     fn: function(p){ return p.length >= 8; } },
      upper:   { el: document.getElementById('rule-upper'),   fn: function(p){ return /[A-Z]/.test(p); } },
      lower:   { el: document.getElementById('rule-lower'),   fn: function(p){ return /[a-z]/.test(p); } },
      num:     { el: document.getElementById('rule-num'),     fn: function(p){ return /[0-9]/.test(p); } },
      special: { el: document.getElementById('rule-special'), fn: function(p){ return /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(p); } }
    };

    document.getElementById('newPass').addEventListener('input', function() {
      var p = this.value;
      var allPass = true;
      for (var key in rules) {
        var ok = rules[key].fn(p);
        rules[key].el.classList.toggle('pass', ok);
        if (!ok) allPass = false;
      }
      this.classList.toggle('invalid', p.length > 0 && !allPass);
      if (allPass) this.classList.remove('invalid');
    });

    document.getElementById('btnReset').addEventListener('click', async function() {
      var alertEl    = document.getElementById('formAlert');
      var confirmErr = document.getElementById('confirmErr');
      var btn        = document.getElementById('btnReset');
      var passEl     = document.getElementById('newPass');
      var confirmEl  = document.getElementById('confirmPass');
      var pass       = passEl.value.trim();
      var confirm    = confirmEl.value.trim();

      confirmErr.style.display = 'none';
      alertEl.style.display = 'none';

      // Check all rules
      var allPass = true;
      for (var key in rules) {
        var ok = rules[key].fn(pass);
        rules[key].el.classList.toggle('pass', ok);
        if (!ok) allPass = false;
      }
      if (!allPass) {
        passEl.classList.add('invalid');
        alertEl.className = 'alert error';
        alertEl.textContent = 'Please meet all password requirements above.';
        alertEl.style.display = 'block';
        return;
      }

      if (pass !== confirm) {
        confirmErr.style.display = 'block';
        confirmEl.classList.add('invalid');
        return;
      }
      confirmEl.classList.remove('invalid');

      btn.disabled = true;
      btn.textContent = 'Updating…';

      try {
        var SUPABASE_URL = 'https://iuexwdjnqfidcwvwbgwr.supabase.co';
        var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1ZXh3ZGpucWZpZGN3dndiZ3dyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMTA1MTksImV4cCI6MjA4OTY4NjUxOX0.N-m3Kxb4EKITOHmJ3tJuQuvZ1LVnWzStFtarCxxvmO0';
        var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Try PKCE code exchange first
        var urlParams = new URLSearchParams(window.location.search);
        var code = urlParams.get('code');
        if (code) {
          var exch = await sb.auth.exchangeCodeForSession(code);
          if (exch.error) throw new Error('Reset link expired. Please request a new one.');
        } else {
          var hash = window.location.hash;
          var hp = new URLSearchParams(hash.replace('#', '?'));
          var accessToken = hp.get('access_token');
          var refreshToken = hp.get('refresh_token');
          if (accessToken) {
            var setRes = await sb.auth.setSession({ access_token: accessToken, refresh_token: refreshToken || '' });
            if (setRes.error) throw new Error('Reset link expired. Please request a new one.');
          } else {
            var sesRes = await sb.auth.getSession();
            if (!sesRes.data?.session) throw new Error('Reset link expired. Please request a new one.');
          }
        }

        var updateRes = await sb.auth.updateUser({ password: pass });
        if (updateRes.error) throw new Error(updateRes.error.message);

        document.getElementById('theForm').style.display = 'none';
        alertEl.className = 'alert success';
        alertEl.innerHTML = '<span style="display:inline-flex;align-items:center;gap:8px"><svg viewBox="0 0 24 24" fill="none" stroke="#48BB78" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;flex-shrink:0"><polyline points="20 6 9 17 4 12"/></svg>Password updated! Open the JumpKit app and sign in with your new password.</span>';
        alertEl.style.display = 'block';
        document.querySelector('.sub').style.display = 'none';

      } catch(e) {
        alertEl.className = 'alert error';
        alertEl.textContent = e.message || 'Something went wrong. Please try again.';
        alertEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Update Password';
      }
    });
  </script>
</body>
</html>
